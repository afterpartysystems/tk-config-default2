################################################################################

includes:
- ../app_locations.yml

################################################################################

# asset
settings.tk-nuke-writenode.asset:
  template_script_work: nuke_asset_work
  write_nodes:
  - file_type: exr
    name: Exr
    proxy_publish_template:
    proxy_render_template:
    publish_template: nuke_asset_render_pub_exr
    render_template: nuke_asset_render_exr
    settings: {}
    tank_type: Rendered Image
    tile_color: []
    promote_write_knobs: [datatype, compression]
  - file_type: dpx
    name: Dpx
    proxy_publish_template:
    proxy_render_template:
    publish_template: nuke_asset_render_pub_dpx
    render_template: nuke_asset_render_dpx
    settings: {}
    tank_type: Rendered Image
    tile_color: []
    promote_write_knobs: []
  - file_type: jpeg
    name: Jpg
    proxy_publish_template:
    proxy_render_template:
    publish_template: nuke_asset_render_pub_jpg
    render_template: nuke_asset_render_jpg
    settings: {}
    tank_type: Rendered Image
    tile_color: []
    promote_write_knobs: [_jpeg_quality, _jpeg_sub_sampling]
  location: "@apps.tk-nuke-writenode.location"


# shot
settings.tk-nuke-writenode.shot:
  template_script_work: nuke_shot_work
  write_nodes:
  - file_type: exr
    name: Element EXR
    proxy_publish_template:
    proxy_render_template:
    publish_template: nuke_shot_render_pub_exr
    render_template: nuke_shot_render_exr
    settings: {}
    tank_type: Rendered Image
    tile_color: []
    promote_write_knobs: [datatype, compression]
  - file_type: exr
    name: Task EXR
    proxy_publish_template:
    proxy_render_template:
    publish_template: nuke_shot_render_pub_taskexr
    render_template: nuke_shot_render_taskexr
    settings: {}
    tank_type: Rendered Image
    tile_color: []
    promote_write_knobs: [datatype, compression]
  - file_type: mov
    name: Element MOV
    proxy_publish_template:
    proxy_render_template:
    publish_template: nuke_shot_render_pub_mov
    render_template: nuke_shot_render_mov
    settings: {mov64_format: "mov (QuickTime / MOV)", mov64_codec: appr, mov_h264_codec_profile: "High 4:2:0 8-bit", mov_prores_codec_profile: "ProRes 4:4:4:4 12-bit"}
    tank_type: Rendered Image
    tile_color: []
    promote_write_knobs: [mov64_codec, mov64_fps, mov_prores_codec_profile]
  - file_type: dpx
    name: Element DPX
    proxy_publish_template:
    proxy_render_template:
    publish_template: nuke_shot_render_pub_dpx
    render_template: nuke_shot_render_dpx
    settings: {}
    tank_type: Rendered Image
    tile_color: []
    promote_write_knobs: []
  - file_type: jpeg
    name: Element JPG
    proxy_publish_template:
    proxy_render_template:
    publish_template: nuke_shot_render_pub_jpg
    render_template: nuke_shot_render_jpg
    settings: {}
    tank_type: Rendered Image
    tile_color: []
    promote_write_knobs: [_jpeg_quality, _jpeg_sub_sampling]
  - file_type: png
    name: Element PNG
    proxy_publish_template:
    proxy_render_template:
    publish_template: nuke_shot_render_pub_png
    render_template: nuke_shot_render_png
    settings: {}
    tank_type: Rendered Image
    tile_color: []
    promote_write_knobs: [datatype]
  location: "@apps.tk-nuke-writenode.location"
